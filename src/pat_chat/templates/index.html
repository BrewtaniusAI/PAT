<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAT Chat — Pan-African Language AI</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --user-bg: #1f3a5f;
    --assistant-bg: #1a2332;
    --success: #3fb950;
    --warning: #d29922;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 13px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
  }

  .status-dot.offline { background: var(--warning); }

  select {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--accent); }

  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.55;
    font-size: 14px;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }

  .message.assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message.system {
    align-self: center;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    padding: 6px 12px;
  }

  .message .meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .message .lang-tag {
    display: inline-block;
    background: var(--bg-tertiary);
    color: var(--accent);
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }

  .typing-indicator {
    align-self: flex-start;
    padding: 12px 16px;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: none;
  }

  .typing-indicator .dots {
    display: flex;
    gap: 4px;
  }

  .typing-indicator .dot {
    width: 8px;
    height: 8px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: bounce 1.4s ease-in-out infinite;
  }

  .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .input-area {
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
  }

  #message-input {
    flex: 1;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    resize: none;
    min-height: 42px;
    max-height: 150px;
  }

  #message-input:focus { border-color: var(--accent); }
  #message-input::placeholder { color: var(--text-secondary); }

  #send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .welcome h2 {
    color: var(--text-primary);
    font-size: 22px;
    margin-bottom: 8px;
  }

  .welcome p { font-size: 14px; margin-bottom: 20px; }

  .lang-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 600px;
    margin: 0 auto;
  }

  .lang-chip {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .lang-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">PAT</div>
    <div class="subtitle">Pan-African Language AI Chat</div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
    <select id="lang-select" title="Language">
      <option value="">Auto-detect</option>
    </select>
  </div>
</header>

<div class="chat-container" id="chat-container">
  <div class="welcome" id="welcome">
    <h2>Welcome to PAT Chat</h2>
    <p>Chat in any of 71 African languages. Type in your language and PAT will respond.</p>
    <div class="lang-grid" id="lang-grid"></div>
  </div>
</div>

<div class="typing-indicator" id="typing">
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="message-input" rows="1" placeholder="Type a message in any African language..." autofocus></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
const chatContainer = document.getElementById('chat-container');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const langSelect = document.getElementById('lang-select');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const typingIndicator = document.getElementById('typing');
const welcome = document.getElementById('welcome');
const langGrid = document.getElementById('lang-grid');

let currentLang = null;

// Auto-resize textarea
messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
});

// Load languages and status
async function init() {
  try {
    const statusResp = await fetch(`${API_BASE}/api/status`);
    const status = await statusResp.json();
    statusDot.className = status.backend_available ? 'status-dot' : 'status-dot offline';
    statusText.textContent = status.backend;

    const langsResp = await fetch(`${API_BASE}/api/languages`);
    const langs = await langsResp.json();
    langs.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.code;
      opt.textContent = `${l.name} (${l.code})`;
      langSelect.appendChild(opt);
    });

    // Show sample language chips
    const samples = langs.filter(l =>
      ['yo', 'sw', 'ha', 'am', 'ig', 'zu', 'wo', 'sn', 'lg', 'rw', 'om', 'af'].includes(l.code)
    );
    samples.forEach(l => {
      const chip = document.createElement('div');
      chip.className = 'lang-chip';
      chip.textContent = l.name;
      chip.onclick = () => {
        langSelect.value = l.code;
        setLanguage(l.code);
        messageInput.focus();
      };
      langGrid.appendChild(chip);
    });
  } catch (e) {
    statusDot.className = 'status-dot offline';
    statusText.textContent = 'Offline';
  }
}

async function setLanguage(code) {
  await fetch(`${API_BASE}/api/language`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({code: code || ''})
  });
  currentLang = code || null;
}

langSelect.addEventListener('change', () => setLanguage(langSelect.value));

function addMessage(role, text, langCode) {
  if (welcome) welcome.style.display = 'none';
  const div = document.createElement('div');
  div.className = `message ${role}`;
  let meta = '';
  if (role === 'assistant' && langCode) {
    meta = `<div class="meta">PAT <span class="lang-tag">${escapeHtml(langCode)}</span></div>`;
  } else if (role === 'user') {
    meta = '<div class="meta">You</div>';
  }
  div.innerHTML = `${meta}${escapeHtml(text)}`;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text) return;

  addMessage('user', text);
  messageInput.value = '';
  messageInput.style.height = 'auto';
  sendBtn.disabled = true;
  typingIndicator.style.display = 'block';
  chatContainer.scrollTop = chatContainer.scrollHeight;

  try {
    const resp = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await resp.json();
    typingIndicator.style.display = 'none';

    if (data.error) {
      addMessage('system', `Error: ${data.error}`);
    } else {
      addMessage('assistant', data.response, data.language_code);
      if (data.language_code && langSelect.value !== data.language_code) {
        langSelect.value = data.language_code;
      }
    }
  } catch (e) {
    typingIndicator.style.display = 'none';
    addMessage('system', 'Failed to connect to PAT. Check that the server is running.');
  }

  sendBtn.disabled = false;
  messageInput.focus();
}

sendBtn.addEventListener('click', sendMessage);
messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

init();
</script>
</body>
</html>
